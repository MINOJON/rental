<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>렌탈 통합 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
input[type=number]{-webkit-appearance:textfield;-moz-appearance:textfield;appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
:root{
  --bg:#F4F6FB;--card:#fff;--card2:#F8F9FD;--border:#E2E5EF;--border2:#CDD1DF;
  --text:#1C2035;--text2:#5A5F78;--text3:#9499B0;
  --blue:#2563EB;--blue-l:#EEF3FD;--blue-ll:#DBEAFE;
  --teal:#059669;--teal-l:#D1FAE5;
  --red:#DC2626;--red-l:#FEE2E2;
  --pink:#DB2777;--pink-l:#FCE7F3;
  --purple:#7C3AED;--purple-l:#EDE9FE;
  --amber:#D97706;--amber-l:#FEF3C7;
  --col:88px;--lw:162px;--r:8px;
}
html,body{height:100%;overflow:hidden;font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* TOPBAR */
.topbar{flex-shrink:0;height:52px;background:var(--blue);display:flex;align-items:center;gap:10px;padding:0 16px}
.logo-icon{width:30px;height:30px;background:rgba(255,255,255,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-title{font-size:14px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;color:rgba(255,255,255,.65)}
.topbar-space{flex:1}
.save-lbl{font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap}
.month-nav{display:flex;align-items:center;gap:5px}
.mon-txt{font-size:13px;font-weight:700;color:#fff;min-width:80px;text-align:center}
.nav-btn{width:32px;height:32px;border-radius:7px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px}

/* TABS */
.tab-bar{flex-shrink:0;background:var(--card);border-bottom:2px solid var(--border);display:flex}
.tab-btn{flex:1;padding:11px 4px;font-size:12px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn.on{color:var(--blue);border-bottom-color:var(--blue)}

/* PAGES */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.page.on{display:flex}

/* TOOLBAR */
.toolbar{flex-shrink:0;background:var(--card);border-bottom:1.5px solid var(--border);padding:8px 16px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{font-size:12px;font-weight:600;padding:8px 13px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}
.btn-outline-red{color:var(--red);border-color:var(--red);background:transparent}
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-left:auto}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* SIZE BAR */
.sizebar{flex-shrink:0;background:var(--card2);border-bottom:1.5px solid var(--border);padding:6px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sizebar label{font-size:11px;font-weight:700;color:var(--text3);white-space:nowrap}
.sz-btn{min-width:32px;height:28px;padding:0 9px;border:1.5px solid var(--border2);border-radius:6px;background:var(--card);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center}
.sz-val{font-size:12px;font-weight:700;min-width:38px;text-align:center}
.sz-div{width:1px;height:18px;background:var(--border2);margin:0 3px}

/* SEARCH BAR */
.search-bar{flex-shrink:0;background:var(--card);border-bottom:1.5px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:8px}
.search-wrap{position:relative;flex:1;max-width:340px}
.search-wrap input{width:100%;font-size:14px;padding:8px 36px 8px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card2);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
.search-wrap input:focus{border-color:var(--blue);background:#fff}
.search-ico{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;cursor:pointer;background:none;border:none;font-family:inherit;line-height:1;padding:0}
.search-count{font-size:12px;color:var(--text3);white-space:nowrap}

/* GANTT */
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gantt-inner{min-width:max-content;position:relative}
.date-hdr{display:flex;border-bottom:2px solid var(--border);background:var(--card2);position:sticky;top:0;z-index:20}
.dh-lbl{width:var(--lw);min-width:var(--lw);padding:8px 12px;font-size:10px;font-weight:700;color:var(--text3);border-right:1px solid var(--border);display:flex;align-items:center;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.dh-col{width:var(--col);min-width:var(--col);text-align:center;padding:5px 2px;font-size:12px;font-weight:500;border-right:1px solid var(--border);cursor:pointer;line-height:1.35;color:var(--text2);flex-shrink:0}
.dh-col .dow{font-size:10px;color:var(--text3);font-weight:400}
.dh-col .hol-nm{font-size:8px;color:#EF4444;display:block;line-height:1.1}
.dh-col.is-today{background:rgba(37,99,235,.1);color:var(--blue);font-weight:700}
.dh-col.is-today .dow{color:var(--blue);opacity:.7}
.dh-col.is-sun,.dh-col.is-hol{color:#EF4444}
.dh-col.is-sun .dow,.dh-col.is-hol .dow{color:#EF4444}
.dh-col.is-sat{color:#3B82F6}
.dh-col.is-sat .dow{color:#3B82F6}

.g-row{display:flex;border-bottom:1px solid var(--border);align-items:stretch}
.g-lbl{width:var(--lw);min-width:var(--lw);padding:7px 30px 7px 12px;display:flex;align-items:flex-start;gap:7px;border-right:1px solid var(--border);background:var(--card);cursor:pointer;flex-shrink:0;position:relative}
.g-lbl.dimmed{opacity:.4}
.g-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.g-info{min-width:0;flex:1;overflow:hidden}
.g-name{font-size:12px;font-weight:700;line-height:1.3;word-break:break-word;color:var(--text)}
.g-sub{font-size:10px;color:var(--text2);line-height:1.35;margin-top:2px;word-break:break-word}
.g-addr{font-size:10px;color:var(--text3);line-height:1.35;margin-top:2px;word-break:break-all;display:flex;gap:3px}
.g-addr-ico{flex-shrink:0;opacity:.7}
.done-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600;background:var(--teal-l);color:var(--teal);margin-left:3px;vertical-align:middle}
.g-cells{display:flex;position:relative;flex:1}
.g-cell{width:var(--col);min-width:var(--col);border-right:1px solid var(--border);flex-shrink:0;cursor:pointer}
.g-cell.is-today{background:rgba(37,99,235,.05)}
.g-cell.is-wknd{background:rgba(0,0,0,.012)}
.g-cell.is-hol{background:rgba(239,68,68,.04)}
.today-line{position:absolute;top:0;bottom:0;pointer-events:none;z-index:3;border-left:2px solid rgba(37,99,235,.3);border-right:2px solid rgba(37,99,235,.3);background:rgba(37,99,235,.05)}

.sbar{position:absolute;top:7px;bottom:7px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:5;text-align:center}
.sbar.dimmed{opacity:.25;filter:grayscale(.6)}
.sbar-send{background:#ffff00;border:2.5px solid #ff0000;color:#555;border-radius:20px 0 0 20px}
.sbar-main{color:#fff;border-radius:20px}
.sbar-main.no-l{border-radius:0 20px 20px 0}
.sbar-main.no-r{border-radius:20px 0 0 20px}
.sbar-main.no-lr{border-radius:0}
.sbar-recv{background:#ff9900;color:#fff;border-radius:0 20px 20px 0}
.sbar .sn{font-size:11px;font-weight:700;line-height:1.2}
.sbar .si{font-size:9px;opacity:.85;line-height:1.2}

.sec-hdr{display:flex;border-bottom:1px solid var(--border);border-top:2px solid var(--border2);background:var(--bg)}
.sec-hdr-lbl{width:var(--lw);min-width:var(--lw);padding:6px 12px;font-size:10px;font-weight:700;color:var(--text3);border-right:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em}
.sec-hdr-cell{width:var(--col);min-width:var(--col);border-right:1px solid var(--border);flex-shrink:0}
.sec-hdr-cell.is-today{background:rgba(37,99,235,.05)}

.sched-row{display:flex;border-bottom:1px solid var(--border);min-height:36px;background:var(--card)}
.sched-lbl{width:var(--lw);min-width:var(--lw);padding:8px 12px;font-size:10px;font-weight:700;color:var(--text3);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.07em}
.sched-lbl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sched-cell{width:var(--col);min-width:var(--col);padding:2px;border-right:1px solid var(--border);flex-shrink:0;cursor:pointer}
.sched-cell.is-today{background:rgba(37,99,235,.05)}
.sched-cell.is-wknd,.sched-cell.is-hol{background:rgba(239,68,68,.03)}
.chip{display:block;padding:1px 4px;border-radius:3px;font-size:10px;margin:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.55;font-weight:600}
.chip-send{background:#fff9c0;color:#7a5700;border:1px solid #ff0000}
.chip-recv{background:#ffe0b2;color:#7a3e00}

.inv-section{border-top:2px solid var(--border2)}
.inv-row{display:flex;border-bottom:1px solid var(--border)}
.inv-name{width:var(--lw);min-width:var(--lw);padding:6px 12px;font-size:11px;color:var(--text2);font-weight:500;border-right:1px solid var(--border);background:var(--card);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.inv-cell{width:var(--col);min-width:var(--col);padding:5px 3px;font-size:12px;font-weight:700;text-align:center;border-right:1px solid var(--border);flex-shrink:0}
.inv-cell.ok{color:var(--teal);background:#F0FDF8}
.inv-cell.warn{color:var(--amber);background:var(--amber-l)}
.inv-cell.danger{color:var(--red);background:var(--red-l)}
.inv-cell.full{color:var(--text3)}
.inv-cell.is-today{outline:2px solid rgba(37,99,235,.35);outline-offset:-2px}
.ord-btns{position:absolute;right:4px;top:8px;display:flex;flex-direction:column;gap:1px;z-index:5}
.ord-btn{width:20px;height:15px;border:1px solid var(--border2);border-radius:3px;background:var(--card2);color:var(--text3);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.empty-state{padding:32px;text-align:center;color:var(--text3);font-size:12px;line-height:1.8}

/* OVERLAY + MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,60,.5);z-index:500;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 12px 60px;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;width:500px;max-width:100%;margin:auto;box-shadow:0 8px 40px rgba(28,32,53,.18);position:relative;flex-shrink:0}
.mx{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-right:40px}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.f-row input,.f-row select,.f-row textarea{width:100%;font-size:16px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card2);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
.f-row input:focus,.f-row select:focus,.f-row textarea:focus{border-color:var(--blue);background:#fff}
.f-row select{padding-right:36px;background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpolygon points='0,0 10,0 5,6' fill='%239499B0'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center}
.f-row textarea{height:52px;resize:none}
.f-half{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sec-sep{margin:14px 0 10px;padding-top:12px;border-top:1.5px solid var(--border);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1.5px solid var(--border);flex-wrap:wrap}
.mbtn{padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--border2);background:var(--card2);color:var(--text2)}
.mbtn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.mbtn-danger{color:var(--red);border-color:rgba(220,38,38,.3);background:var(--red-l);margin-right:auto}
.mbtn-success{color:var(--teal);border-color:rgba(5,150,105,.3);background:var(--teal-l)}
.mbtn-amber{color:var(--amber);border-color:rgba(217,119,6,.35);background:var(--amber-l)}
.hide{display:none!important}

/* ITEM ROWS */
.item-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.item-list:empty::after{content:'⬇ 아래 버튼으로 품목을 추가하세요';display:block;padding:18px 12px;text-align:center;color:var(--text3);font-size:12px;background:var(--card2);border-radius:var(--r);border:1.5px dashed var(--border2);font-weight:500}
.item-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:9px 11px;background:var(--bg);border-radius:var(--r);border:1.5px solid var(--border)}
.item-row select{flex:1 1 100%;min-width:0;font-size:15px;padding:8px 28px 8px 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpolygon points='0,0 10,0 5,6' fill='%239499B0'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 9px center;cursor:pointer;outline:none;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.item-row .qty-lbl{font-size:11px;color:var(--text3);font-weight:600;margin-left:2px}
.item-row input[type=number]{width:70px;font-size:16px;padding:7px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-family:inherit;text-align:center;-webkit-appearance:textfield;appearance:textfield;outline:none}
.item-row .rm-btn{margin-left:auto}
.rm-btn{width:30px;height:30px;border-radius:7px;border:1.5px solid rgba(220,38,38,.3);background:var(--red-l);color:var(--red);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.add-item-btns{display:flex;gap:7px}
.add-item-btn{flex:1;padding:10px;border-radius:var(--r);border:1.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600}
.qr-add-btn{padding:10px 14px;border-radius:var(--r);border:1.5px solid var(--blue);background:var(--blue-l);color:var(--blue);cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}

/* RANGE BTN */
.range-btn{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card2);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;-webkit-appearance:none;appearance:none;outline:none}
.range-btn:focus{border-color:var(--blue)}
.rb-ico{font-size:15px;flex-shrink:0}
.rb-txt{flex:1;color:var(--text3)}
.rb-txt.filled{color:var(--text)}
.rb-arr{font-size:10px;color:var(--text3)}

/* STOCK ROW */
.stock-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px}
.stock-row .nm{flex:1;font-size:12px;font-weight:500}
.stock-row input{width:62px;font-size:13px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-family:inherit;text-align:center;outline:none}
.stock-row .del-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid rgba(220,38,38,.3);background:var(--red-l);color:var(--red);cursor:pointer;font-family:inherit;font-weight:600}

.hol-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px}
.hol-row span{flex:1;font-size:13px;color:var(--red);font-weight:500}
.hol-row button{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit}

.day-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.day-item:last-child{border-bottom:none}
.d-sec{font-size:10px;font-weight:700;color:var(--text3);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.07em}
.chip2{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.inv-bar-w{width:48px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;flex-shrink:0}
.inv-bar-f{height:100%;border-radius:99px}

/* CALENDAR */
#cal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000}
.cal-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9100;background:var(--card);border:1.5px solid var(--border2);border-radius:14px;box-shadow:0 20px 60px rgba(28,32,53,.3);padding:16px;width:min(580px,calc(100vw - 20px));max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;gap:10px}
.cal-popup.open{display:flex}
.cal-hint{font-size:11px;font-weight:600;color:var(--blue);padding:6px 10px;background:var(--blue-l);border-radius:6px}
#cal-send .cal-hint{color:#7a5700;background:#FFF9C0}
#cal-recv .cal-hint{color:#7a3e00;background:#FFE0B2}
.cal-months{display:flex;gap:14px;flex-wrap:wrap}
.cal-month{flex:1;min-width:220px}
.cal-navrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-navrow strong{font-size:13px}
.cal-navrow button{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;font-size:12px;border-radius:7px;cursor:pointer;color:var(--text);font-weight:500;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;user-select:none}
.cal-day.emp{visibility:hidden;pointer-events:none}
.cal-day.hol{color:#EF4444}
.cal-day.sat{color:#3B82F6}
.cal-day.cur-day{font-weight:700;outline:2px solid var(--blue);outline-offset:-1px}

#cal-recv .cal-day.sel-e{background:#ff9900!important;color:#fff!important;border-radius:0 7px 7px 0}

/* QR SCANNER POPUP */
#qr-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9500}
.qr-pop{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9600;background:#0a0a0a;border-radius:18px;overflow:hidden;width:min(420px,calc(100vw - 24px));box-shadow:0 20px 60px rgba(0,0,0,.6)}
.qr-pop.open{display:block}
.qr-pop-hdr{padding:13px 16px;background:#111;display:flex;align-items:center;justify-content:space-between;color:#fff}
.qr-pop-hdr span{font-size:14px;font-weight:600}
.qr-pop-hdr button{width:30px;height:30px;border-radius:7px;border:none;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qr-video-wrap{position:relative;background:#000;min-height:260px;display:flex;align-items:center;justify-content:center}
#qr-video{width:100%;display:block;max-height:340px;object-fit:cover}
#qr-canvas{display:none}
.qr-corner{position:absolute;width:26px;height:26px;border-color:rgba(255,220,0,.9);border-style:solid;border-width:0}
.qrc1{top:12%;left:8%;border-top-width:3px;border-left-width:3px;border-radius:5px 0 0 0}
.qrc2{top:12%;right:8%;border-top-width:3px;border-right-width:3px;border-radius:0 5px 0 0}
.qrc3{bottom:12%;left:8%;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 5px}
.qrc4{bottom:12%;right:8%;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 5px 0}
.qr-scanline{position:absolute;left:10%;right:10%;height:2px;background:rgba(255,220,0,.85);border-radius:2px;animation:scan-anim 2s ease-in-out infinite}
@keyframes scan-anim{0%,100%{top:14%}50%{top:82%}}
.qr-pop-hint{padding:12px 14px;background:#111;color:rgba(255,255,255,.7);font-size:12px;text-align:center;line-height:1.5}
.qr-manual{padding:10px 14px;background:#1a1a1a;display:flex;gap:8px}
.qr-manual input{flex:1;padding:9px 12px;border-radius:8px;border:1.5px solid #333;background:#111;color:#fff;font-family:inherit;font-size:14px;outline:none}
.qr-manual input:focus{border-color:#555}
.qr-manual button{padding:9px 14px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}

/* LOG PAGE */

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C2035;color:#fff;font-size:13px;font-weight:500;padding:11px 20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.req{color:var(--red);font-size:10px;font-weight:700;margin-left:4px}

<script>
'use strict';
/* ===== 한국 공휴일 ===== */
const KH={'2025-01-01':'신정','2025-01-28':'설날연휴','2025-01-29':'설날','2025-01-30':'설날연휴','2025-03-01':'삼일절','2025-05-05':'어린이날','2025-05-06':'대체공휴일','2025-05-12':'부처님오신날','2025-06-06':'현충일','2025-08-15':'광복절','2025-10-03':'개천절','2025-10-05':'추석연휴','2025-10-06':'추석','2025-10-07':'추석연휴','2025-10-08':'대체공휴일','2025-10-09':'한글날','2025-12-25':'크리스마스','2026-01-01':'신정','2026-01-28':'설날연휴','2026-01-29':'설날','2026-01-30':'설날연휴','2026-03-01':'삼일절','2026-05-05':'어린이날','2026-05-24':'부처님오신날','2026-06-06':'현충일','2026-08-15':'광복절','2026-09-24':'추석연휴','2026-09-25':'추석','2026-09-26':'추석연휴','2026-09-27':'대체공휴일','2026-10-03':'개천절','2026-10-09':'한글날','2026-12-25':'크리스마스','2027-01-01':'신정','2027-02-16':'설날연휴','2027-02-17':'설날','2027-02-18':'설날연휴','2027-03-01':'삼일절','2027-05-02':'부처님오신날','2027-05-05':'어린이날','2027-06-06':'현충일','2027-08-15':'광복절','2027-10-03':'개천절','2027-10-04':'추석연휴','2027-10-05':'추석','2027-10-06':'추석연휴','2027-10-09':'한글날','2027-12-25':'크리스마스'};
const SCOL={both:'#2563EB',direct:'#7C3AED',airport:'#0891B2',send_only:'#059669',recv_only:'#DB2777'};
const DAYS=['일','월','화','수','목','금','토'];
const MNAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

/* ===== DB ===== */
const KS='rmi_stock',KR='rmi_rentals',KHL='rmi_hol',KLG='rmi_logs',KLY='rmi_layout';
function dbLoad(){
  try{
    const s=JSON.parse(localStorage.getItem(KS)||'null');
    const r=JSON.parse(localStorage.getItem(KR)||'null');
    const h=JSON.parse(localStorage.getItem(KHL)||'null');
    const lg=JSON.parse(localStorage.getItem(KLG)||'null');
    return{
      stock: s||[
        {id:'s1',name:'파워업밴드-마리오',total:4,cat:'게임기',qrId:'BAND-001',count:0,note:''},
        {id:'s2',name:'파워업밴드-루이지',total:2,cat:'게임기',qrId:'BAND-002',count:0,note:''},
        {id:'s3',name:'파워업밴드-피치공주',total:2,cat:'게임기',qrId:'BAND-003',count:0,note:''},
        {id:'s4',name:'소니 A7C',total:2,cat:'카메라',qrId:'CAM-001',count:0,note:''},
        {id:'s5',name:'맥북 에어 M3',total:1,cat:'노트북',qrId:'MAC-001',count:0,note:''},
      ],
      rentals: r||[
        {id:'r1',cust:'김민준',items:[{sid:'s4',qty:1}],start:'2026-05-05',end:'2026-05-12',ship:'both',ss:'2026-05-03',se:'2026-05-04',vs:'2026-05-13',ve:'2026-05-14',apPick:'',apRet:'',apMemo:'',memo:'',done:false},
        {id:'r2',cust:'이서연',items:[{sid:'s5',qty:1}],start:'2026-05-06',end:'2026-05-15',ship:'airport',ss:'',se:'',vs:'',ve:'',apPick:'09:30',apRet:'22:00',apMemo:'인천공항 T1',memo:'',done:false},
        {id:'r3',cust:'박준혁',items:[{sid:'s1',qty:1},{sid:'s2',qty:1},{sid:'s3',qty:1}],start:'2026-05-08',end:'2026-05-14',ship:'both',ss:'2026-05-06',se:'2026-05-07',vs:'2026-05-15',ve:'2026-05-16',apPick:'',apRet:'',apMemo:'',memo:'',done:false},
      ],
      hol: h||[],
      logs: lg||[],
    };
  }catch(e){return{stock:[],rentals:[],hol:[],logs:[]};}
}
function dbSave(){
  try{
    localStorage.setItem(KS,JSON.stringify(DB.stock));
    localStorage.setItem(KR,JSON.stringify(DB.rentals));
    localStorage.setItem(KHL,JSON.stringify(DB.hol));
    localStorage.setItem(KLG,JSON.stringify(DB.logs));
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('rmi_saved_at',t);
    document.getElementById('save-lbl').textContent='저장됨 '+t;
  }catch(e){}
}
let DB=dbLoad();
// 기존 데이터 마이그레이션 (qrId, count 필드 없을 때)
DB.stock.forEach(s=>{
  if(s.qrId===undefined) s.qrId='';
  if(s.count===undefined) s.count=0;
  if(s.cat===undefined) s.cat='';
  if(s.note===undefined) s.note='';
});

/* ===== LAYOUT ===== */
let COL_W=88, ROW_H=52;
(function(){
  try{const d=JSON.parse(localStorage.getItem(KLY)||'{}');if(d.c>0)COL_W=d.c;if(d.r>0)ROW_H=d.r;}catch(e){}
})();
function saveLayout(){try{localStorage.setItem(KLY,JSON.stringify({c:COL_W,r:ROW_H}));}catch(e){}}
function applyCss(){
  document.documentElement.style.setProperty('--col',COL_W+'px');
  document.getElementById('col-val').textContent=COL_W+'px';
  document.getElementById('row-val').textContent=ROW_H+'px';
  document.querySelectorAll('.g-row').forEach(el=>el.style.minHeight=ROW_H+'px');
  document.querySelectorAll('.g-cell').forEach(el=>el.style.minHeight=ROW_H+'px');
}

/* ===== TAB ===== */
let curTab='schedule';
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('on',p.id==='page-'+tab));
  document.getElementById('month-nav').style.display=(tab==='schedule')?'flex':'none';
  if(tab==='products')renderProducts();
  if(tab==='logs')renderLogs();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

/* ===== DATE UTILS ===== */
let VY=new Date().getFullYear(), VM=new Date().getMonth();
function pad(n){return String(n).padStart(2,'0')}
function ds(d){return d?d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()):'';}
function dp(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function clr(d){const c=new Date(d);c.setHours(0,0,0,0);return c;}
function same(a,b){return a&&b&&clr(a).getTime()===clr(b).getTime();}
function fmtD(d){return d?(d.getMonth()+1)+'월'+d.getDate()+'일':'';}
function fmtRange(s,e){if(!s)return null;if(!e)return fmtD(s)+' → 종료일 선택';return fmtD(s)+' ~ '+fmtD(e);}
function fmtDt(iso){const d=new Date(iso);return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
function monthDays(){const arr=[],f=new Date(VY,VM,1),l=new Date(VY,VM+1,0);for(let d=new Date(f);d<=l;d.setDate(d.getDate()+1))arr.push(clr(new Date(d)));return arr;}
function isHol(d){const s=ds(clr(d));return !!(KH[s]||DB.hol.find(h=>h.date===s));}
function holName(d){const s=ds(clr(d));return KH[s]||(DB.hol.find(h=>h.date===s)||{}).memo||'';}
function fmtMon(s){const d=dp(s);return d?(d.getMonth()+1)+'/'+d.getDate():'';}

/* ===== INVENTORY ===== */
function calcInv(dstr){
  const d=clr(dp(dstr));const rem={};
  DB.stock.forEach(s=>rem[s.id]=s.total);
  DB.rentals.forEach(r=>{
    if(r.done)return;
    const from=clr(dp(r.ss||r.start)),to=clr(dp(r.ve||r.end));
    if(d>=from&&d<=to) r.items.forEach(it=>rem[it.sid]=(rem[it.sid]||0)-it.qty);
  });
  return rem;
}

function getScheds(dstr){
  const d=clr(dp(dstr));const out=[];
  DB.rentals.forEach(r=>{
    if(r.done)return;
    const ss=r.ss?clr(dp(r.ss)):null,vs=r.vs?clr(dp(r.vs)):null;
    if(ss&&same(d,ss))out.push({t:'send',lbl:r.cust+' 택배 발송',r});
    if(vs&&same(d,vs))out.push({t:'recv',lbl:r.cust+' 수거 예약',r});
    if(r.ship==='recv_only'&&same(d,clr(dp(r.end)))&&!vs)out.push({t:'recv',lbl:r.cust+' 수거 예약',r});
  });
  return out;
}

function iname(id){return(DB.stock.find(x=>x.id===id)||{name:'?'}).name;}
function isum(r){return r.items.map(it=>iname(it.sid)+' x'+it.qty).join(', ');}
function scol(ship){return SCOL[ship]||SCOL.both;}

/* ===== BARS ===== */
function makeBars(r,days){
  const n=days.length,done=!!r.done;
  const ss=r.ss?clr(dp(r.ss)):null,se=r.se?clr(dp(r.se)):null;
  const rs=clr(dp(r.start)),re=clr(dp(r.end));
  const vs=r.vs?clr(dp(r.vs)):null,ve=r.ve?clr(dp(r.ve)):null;
  const hasSend=!done&&ss&&se,hasRecv=!done&&vs&&ve;
  const col=scol(r.ship);
  const shipLbl={both:'[택배]',direct:'[직접]',airport:'[공항]',send_only:'[발송]',recv_only:'[수거]'}[r.ship]||'';
  const apNote=r.ship==='airport'?(
    (r.apAirportPick?'수령:'+r.apAirportPick:'')
    +(r.apPick?' '+r.apPick:'')
    +(r.apAirportRet?' / 반납:'+r.apAirportRet:'')
    +(r.apRet?' '+r.apRet:'')
    +(r.apMemo?' ('+r.apMemo+')':'')
  ):'';
  const nameStr=r.cust+' '+fmtMon(r.start)+'~'+fmtMon(r.end)+' '+shipLbl+(apNote?' '+apNote:'');
  const itemStr=isum(r),dim=done?' dimmed':'';
  function span(from,to,extraCls,style,inner){
    let si=-1,ei=-1;
    for(let i=0;i<n;i++){if(days[i]>=from&&days[i]<=to){if(si<0)si=i;ei=i;}}
    if(si<0)return'';
    return `<div class="sbar ${extraCls}${dim}" data-edit="${r.id}" style="left:${si*COL_W+1}px;width:${(ei-si+1)*COL_W-2}px;${style}">${inner}</div>`;
  }
  let out='';
  if(hasSend)out+=span(ss,se,'sbar-send','','<span>발송중</span>');
  let mainCls='sbar-main';
  if(hasSend&&hasRecv)mainCls+=' no-lr';else if(hasSend)mainCls+=' no-l';else if(hasRecv)mainCls+=' no-r';
  out+=span(rs,re,mainCls,'background:'+col+';','<span class="sn">'+nameStr+'</span><span class="si">'+itemStr+'</span>');
  if(hasRecv)out+=span(vs,ve,'sbar-recv','','<span>수거중</span>');
  return out;
}

function sortRentals(){
  return [...DB.rentals].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const da=a.ss||a.start||'9999',db=b.ss||b.start||'9999';
    if(da!==db)return da<db?-1:1;
    return DB.rentals.indexOf(a)-DB.rentals.indexOf(b);
  });
}

function render(){
  const today=clr(new Date()),days=monthDays();
  const todayIdx=days.findIndex(d=>same(d,today));
  const sorted=sortRentals();
  document.getElementById('mon-lbl').textContent=VY+'년 '+(VM+1)+'월';
  document.getElementById('today-lbl').textContent=today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const savedAt=localStorage.getItem('rmi_saved_at');
  if(savedAt)document.getElementById('save-lbl').textContent='저장됨 '+savedAt;

  let h='';
  h+='<div class="date-hdr"><div class="dh-lbl">대여 현황</div>';
  days.forEach(d=>{
    const dow=d.getDay(),tod=same(d,today),hol=isHol(d),hn=holName(d);
    let cls='dh-col';
    if(tod)cls+=' is-today';
    if(hol||dow===0)cls+=' is-hol';else if(dow===6)cls+=' is-sat';
    h+=`<div class="${cls}" data-day="${ds(d)}"><div>${d.getDate()}</div><div class="dow">${DAYS[dow]}</div>${hn?`<span class="hol-nm">${hn.slice(0,4)}</span>`:''}</div>`;
  });
  h+='</div>';
  if(!sorted.length)h+='<div class="empty-state">등록된 대여 내역이 없습니다.<br>+ 대여 등록 버튼을 눌러 추가하세요.</div>';
  sorted.forEach(r=>{
    const done=!!r.done;
    h+=`<div class="g-row" data-rid="${r.id}" style="min-height:${ROW_H}px">`;
    h+=`<div class="g-lbl${done?' dimmed':''}" data-edit="${r.id}"><div class="g-dot" style="background:${scol(r.ship)}"></div><div class="g-info"><div class="g-name">${r.cust}${done?'<span class="done-badge">반납완료</span>':''}</div><div class="g-sub">📦 ${isum(r)}</div>${r.phone?`<div class="g-sub">📞 ${r.phone}</div>`:''}${r.addr?`<div class="g-addr"><span class="g-addr-ico">📍</span><span>${r.addr}</span></div>`:''}</div></div>`;
    h+='<div class="g-cells">';
    days.forEach(d=>{
      const dow=d.getDay(),tod=same(d,today),hol=isHol(d);
      let cls='g-cell';
      if(tod)cls+=' is-today';
      if(hol)cls+=' is-hol';else if(dow===0||dow===6)cls+=' is-wknd';
      h+=`<div class="${cls}" style="min-height:${ROW_H}px" data-day="${ds(d)}"></div>`;
    });
    if(todayIdx>=0)h+=`<div class="today-line" style="left:${todayIdx*COL_W}px;width:${COL_W}px"></div>`;
    h+=makeBars(r,days);
    h+='</div></div>';
  });
  h+='<div class="sec-hdr"><div class="sec-hdr-lbl">스케줄</div>';
  days.forEach(d=>h+=`<div class="sec-hdr-cell${same(d,today)?' is-today':''}"></div>`);
  h+='</div>';
  h+='<div class="sched-row"><div class="sched-lbl"><div class="sched-lbl-dot" style="background:#ff0000"></div>📦 택배 발송</div>';
  days.forEach(d=>{
    const dow=d.getDay(),tod=same(d,today),hol=isHol(d);
    const ch=getScheds(ds(d)).filter(s=>s.t==='send').map(s=>`<span class="chip chip-send">${s.lbl}</span>`).join('');
    let cls='sched-cell';if(tod)cls+=' is-today';if(hol)cls+=' is-hol';else if(dow===0||dow===6)cls+=' is-wknd';
    h+=`<div class="${cls}" data-day="${ds(d)}">${ch}</div>`;
  });
  h+='</div>';
  h+='<div class="sched-row"><div class="sched-lbl"><div class="sched-lbl-dot" style="background:#ff9900"></div>📬 택배 수거</div>';
  days.forEach(d=>{
    const dow=d.getDay(),tod=same(d,today),hol=isHol(d);
    const ch=getScheds(ds(d)).filter(s=>s.t==='recv').map(s=>`<span class="chip chip-recv">${s.lbl}</span>`).join('');
    let cls='sched-cell';if(tod)cls+=' is-today';if(hol)cls+=' is-hol';else if(dow===0||dow===6)cls+=' is-wknd';
    h+=`<div class="${cls}" data-day="${ds(d)}">${ch}</div>`;
  });
  h+='</div>';
  h+='<div class="sec-hdr"><div class="sec-hdr-lbl">재고 현황</div>';
  days.forEach(d=>h+=`<div class="sec-hdr-cell${same(d,today)?' is-today':''}"></div>`);
  h+='</div><div class="inv-section">';
  DB.stock.forEach(s=>{
    h+=`<div class="inv-row"><div class="inv-name">${s.name} <span style="color:var(--text3);font-weight:400">(총 ${s.total})</span></div>`;
    days.forEach(d=>{
      const left=(calcInv(ds(d))[s.id]??s.total),ratio=s.total>0?left/s.total:1,tod=same(d,today);
      const cls=left<=0?'danger':ratio<=.5?'warn':left===s.total?'full':'ok';
      h+=`<div class="inv-cell ${cls}${tod?' is-today':''}">${left<=0?'✕':left}</div>`;
    });
    h+='</div>';
  });
  h+='</div>';

  const gi=document.getElementById('gi');
  gi.innerHTML=h;
  gi.querySelectorAll('.g-row').forEach((row,i)=>{
    const r=sorted[i];if(!r)return;
    const lbl=row.querySelector('.g-lbl');if(!lbl)return;
    const wrap=document.createElement('div');wrap.className='ord-btns';
    ['▲','▼'].forEach((sym,di)=>{
      const b=document.createElement('button');b.className='ord-btn';b.textContent=sym;b.title=di===0?'위로':'아래로';
      b.addEventListener('click',ev=>{
        ev.stopPropagation();
        const idx=DB.rentals.findIndex(x=>x.id===r.id);if(idx<0)return;
        const to=idx+(di===0?-1:1);if(to<0||to>=DB.rentals.length)return;
        const[item]=DB.rentals.splice(idx,1);DB.rentals.splice(to,0,item);
        dbSave();render();
      });
      wrap.appendChild(b);
    });
    lbl.appendChild(wrap);
  });
  applyCss();
}

/* ===== CALENDAR ===== */
const CSTATE={
  rent:{s:null,e:null,step:'s',y:new Date().getFullYear(),m:new Date().getMonth()},
  send:{s:null,e:null,step:'s',y:new Date().getFullYear(),m:new Date().getMonth()},
  recv:{s:null,e:null,step:'s',y:new Date().getFullYear(),m:new Date().getMonth()},
};
let openCalKey=null;
function calSetDate(key,s,e){
  const c=CSTATE[key];c.s=dp(s);c.e=dp(e);c.step='s';
  if(c.s){c.y=c.s.getFullYear();c.m=c.s.getMonth();}
  calUpdateBtn(key);
}
function calUpdateBtn(key){
  const c=CSTATE[key];
  const txt=fmtRange(c.s,c.e)||'날짜를 선택하세요';
  const el=document.getElementById('lbl-'+key);
  if(el){el.textContent=txt;el.classList.toggle('filled',!!(c.s&&c.e));}
}
function calOpen(key){
  if(openCalKey&&openCalKey!==key)document.getElementById('cal-'+openCalKey).classList.remove('open');
  const popup=document.getElementById('cal-'+key);
  if(popup.classList.contains('open')){calClose();return;}
  openCalKey=key;calBuild(key);popup.classList.add('open');
  document.getElementById('cal-bd').style.display='block';
}
function calClose(){
  ['rent','send','recv'].forEach(k=>document.getElementById('cal-'+k).classList.remove('open'));
  document.getElementById('cal-bd').style.display='none';
  openCalKey=null;
}
function calBuild(key){
  const c=CSTATE[key],today=clr(new Date());
  const S=c.s?clr(c.s):null,E=c.e?clr(c.e):null;
  const prevRent=key!=='rent'?{s:CSTATE.rent.s?clr(CSTATE.rent.s):null,e:CSTATE.rent.e?clr(CSTATE.rent.e):null}:null;
  const prevSend=key==='recv'?{s:CSTATE.send.s?clr(CSTATE.send.s):null,e:CSTATE.send.e?clr(CSTATE.send.e):null}:null;
  const hint=(!S||c.step==='s')?'① 시작일을 탭하세요':'② 종료일을 탭하세요 (시작: '+fmtD(S)+')';
  let previewBadges='';
  if(key==='send'&&prevRent&&(prevRent.s||prevRent.e))previewBadges+=`<div class="cal-prev-row"><span class="cal-prev-badge rent-badge">📅 대여기간: ${fmtRange(prevRent.s,prevRent.e)||'미선택'}</span></div>`;
  if(key==='recv'){
    if(prevRent&&(prevRent.s||prevRent.e))previewBadges+=`<div class="cal-prev-row" style="margin-bottom:4px"><span class="cal-prev-badge rent-badge">📅 대여기간: ${fmtRange(prevRent.s,prevRent.e)||'미선택'}</span>`;
    if(prevSend&&(prevSend.s||prevSend.e))previewBadges+=`<span class="cal-prev-badge send-badge" style="margin-left:6px">📦 발송기간: ${fmtRange(prevSend.s,prevSend.e)||'미선택'}</span>`;
    if(previewBadges)previewBadges+='</div>';
  }
  let months='';
  for(let mi=0;mi<2;mi++){
    let cy=c.y,cm=c.m+mi;
    if(cm>11){cm-=12;cy++;}
    const dim=new Date(cy,cm+1,0).getDate();
    const sdow=new Date(cy,cm,1).getDay();
    let grid=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    for(let i=0;i<sdow;i++)grid+=`<div class="cal-day emp"></div>`;
    for(let day=1;day<=dim;day++){
      const cur=clr(new Date(cy,cm,day)),dstr=ds(cur),dow=cur.getDay();
      const iS=S&&cur.getTime()===S.getTime(),iE=E&&cur.getTime()===E.getTime();
      const inR=S&&E&&cur>S&&cur<E,isTod=cur.getTime()===today.getTime();
      const hol=!!KH[dstr]||DB.hol.some(h=>h.date===dstr)||dow===0;
      let previewCls='';
      if(prevRent&&prevRent.s&&prevRent.e){
        const pS=prevRent.s,pE=prevRent.e;
        if(cur.getTime()===pS.getTime())previewCls='prev-rent-s';
        else if(cur.getTime()===pE.getTime())previewCls='prev-rent-e';
        else if(cur>pS&&cur<pE)previewCls='prev-rent-rng';
      }
      if(prevSend&&prevSend.s&&prevSend.e){
        const pS=prevSend.s,pE=prevSend.e;
        if(cur.getTime()===pS.getTime())previewCls='prev-send-s';
        else if(cur.getTime()===pE.getTime())previewCls='prev-send-e';
        else if(cur>pS&&cur<pE)previewCls='prev-send-rng';
      }
      let cls='cal-day';
      if(iS)cls+=' sel-s';if(iE)cls+=' sel-e';if(inR)cls+=' in-rng';if(isTod)cls+=' cur-day';
      if(hol)cls+=' hol';else if(dow===6)cls+=' sat';
      const isPreviewOnly=previewCls&&!iS&&!iE&&!inR;
      if(isPreviewOnly)cls+=' '+previewCls;
      const hn=(DB.hol.find(h=>h.date===dstr)||{}).memo||KH[dstr]||'';
      const hnlbl=hn?`<span style="font-size:8px;display:block;line-height:1">${hn.slice(0,4)}</span>`:'';
      const clickAttr=isPreviewOnly?'':`data-cal-day="${key}|${dstr}"`;
      const cursorStyle=isPreviewOnly?'style="cursor:default"':'';
      grid+=`<div class="${cls}" ${clickAttr} ${cursorStyle}>${day}${hnlbl}</div>`;
    }
    const prevBtn=mi===0?`<button data-cal-nav="${key}|-1">&#8592;</button>`:'<span></span>';
    const nextBtn=mi===1?`<button data-cal-nav="${key}|1">&#8594;</button>`:'<span></span>';
    months+=`<div class="cal-month"><div class="cal-navrow">${prevBtn}<strong>${cy}년 ${MNAMES[cm]}</strong>${nextBtn}</div><div class="cal-grid">${grid}</div></div>`;
  }
  const infoTxt=fmtRange(S,E)||'시작일을 탭하세요';
  document.getElementById('cal-'+key).innerHTML=
    (previewBadges||'')
    +`<div class="cal-hint">${hint}</div>`
    +`<div class="cal-months">${months}</div>`
    +`<div class="cal-footer"><span class="cal-info">${infoTxt}</span><button class="mbtn" data-cal-clear="${key}">초기화</button><button class="mbtn mbtn-blue" data-cal-confirm="${key}">확인</button></div>`;
}

    });
  }

}

/* ===== STOCK CHECK ===== */
function checkStock(items,startStr,endStr,skipId){
  const from=clr(dp(startStr)),to=clr(dp(endStr));
  for(let d=new Date(from);d<=to;d.setDate(d.getDate()+1)){
    const dstr=ds(clr(d)),used={};
    DB.rentals.forEach(r=>{
      if(r.done||r.id===skipId)return;
      const rFrom=clr(dp(r.ss||r.start)),rTo=clr(dp(r.ve||r.end)),cur=clr(dp(dstr));
      if(cur>=rFrom&&cur<=rTo)r.items.forEach(it=>{used[it.sid]=(used[it.sid]||0)+it.qty;});
    });
    for(const it of items){
      const stock=DB.stock.find(s=>s.id===it.sid);if(!stock)continue;
      if((used[it.sid]||0)+it.qty>stock.total)return `"${stock.name}" 재고 부족 (${dstr}: ${stock.total}개 중 ${used[it.sid]||0}개 사용중)`;
    }
  }
  return null;
}

/* ===== SAVE RENTAL (대여 횟수 자동 카운트!) ===== */
function doSaveRental(){
  const cust=document.getElementById('f-cust').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const addr=document.getElementById('f-addr').value.trim();
  const ship=document.getElementById('f-ship').value;
  const rc=CSTATE.rent,sc=CSTATE.send,vc=CSTATE.recv;
  if(!cust){toast('⚠️ 고객명을 입력해주세요');const el=document.getElementById('f-cust');el.style.borderColor='var(--red)';el.focus();setTimeout(()=>el.style.borderColor='',2000);return;}
  if(!phone){toast('⚠️ 전화번호를 입력해주세요');const el=document.getElementById('f-phone');el.style.borderColor='var(--red)';el.focus();setTimeout(()=>el.style.borderColor='',2000);return;}
  if(!addr){toast('⚠️ 주소를 입력해주세요');const el=document.getElementById('f-addr');el.style.borderColor='var(--red)';el.focus();setTimeout(()=>el.style.borderColor='',2000);return;}
  if(!rc.s||!rc.e){toast('⚠️ 대여 기간을 선택해주세요');return;}
  const items=itemsGet();
  if(!items.length){toast('⚠️ 대여 품목을 추가해주세요');return;}
  const stockErr=checkStock(items,ds(rc.s),ds(rc.e),editId);
  if(stockErr){toast('⚠️ '+stockErr);return;}
  const rec={
    cust,
    phone,
    addr,
    items,start:ds(rc.s),end:ds(rc.e),ship,
    ss:sc.s?ds(sc.s):'',se:sc.e?ds(sc.e):'',
    vs:vc.s?ds(vc.s):'',ve:vc.e?ds(vc.e):'',
    apPick:document.getElementById('f-ap-pick').value,
    apRet:document.getElementById('f-ap-ret').value,
    apAirportPick:document.getElementById('f-ap-airport-pick').value.trim(),
    apAirportRet:document.getElementById('f-ap-airport-ret').value.trim(),
    apMemo:document.getElementById('f-ap-memo').value.trim(),
    memo:document.getElementById('f-memo').value.trim(),
  };
  if(editId){
    const ex=DB.rentals.find(x=>x.id===editId);
    if(ex){
      // 수정: 품목 변경된 경우 차이만큼 카운트 조정
      const oldItems=ex.items||[];
      const oldMap={};oldItems.forEach(it=>oldMap[it.sid]=(oldMap[it.sid]||0)+it.qty);
      const newMap={};items.forEach(it=>newMap[it.sid]=(newMap[it.sid]||0)+it.qty);
      const allSids=new Set([...Object.keys(oldMap),...Object.keys(newMap)]);
      allSids.forEach(sid=>{
        const diff=(newMap[sid]||0)-(oldMap[sid]||0);
        if(diff>0){
          const s=DB.stock.find(x=>x.id===sid);
          if(s)s.count=(s.count||0)+diff;
          // 추가된 만큼 rent 로그
          DB.logs.push({id:'lg'+Date.now()+'_'+Math.random().toString(36).slice(2,5),type:'rent',sid,name:(s?s.name:'?'),qty:diff,rentalId:editId,cust,date:new Date().toISOString()});
        } else if(diff<0){
          // 감소 시 카운트 차감
          const s=DB.stock.find(x=>x.id===sid);
          if(s)s.count=Math.max(0,(s.count||0)+diff);
        }
      });
      Object.assign(ex,{...rec,done:ex.done});
    }
  } else {
    // 신규 등록: 각 품목 count += qty, rent 로그 기록
    const newId='r'+Date.now();
    DB.rentals.push({id:newId,done:false,...rec});
    items.forEach(it=>{
      const s=DB.stock.find(x=>x.id===it.sid);
      if(s)s.count=(s.count||0)+it.qty;
      DB.logs.push({id:'lg'+Date.now()+'_'+Math.random().toString(36).slice(2,5),type:'rent',sid:it.sid,name:(s?s.name:'?'),qty:it.qty,rentalId:newId,cust,date:new Date().toISOString()});
    });
    toast('✅ 대여 등록 완료 - 대여횟수 자동 카운트됨');
  }
  dbSave();modalClose('modal-rental');render();
}
function showDelConfirm(){document.getElementById('del-confirm-row').classList.remove('hide');}
function hideDelConfirm(){document.getElementById('del-confirm-row').classList.add('hide');}
function doDeleteConfirmed(){
  if(!editId)return;
  // 삭제 시 카운트 차감 (반납완료가 아니었다면)
  const r=DB.rentals.find(x=>x.id===editId);
  if(r&&!r.done){
    r.items.forEach(it=>{
      const s=DB.stock.find(x=>x.id===it.sid);
      if(s)s.count=Math.max(0,(s.count||0)-it.qty);
    });
  }
  DB.rentals=DB.rentals.filter(x=>x.id!==editId);
  // 관련 로그도 제거
  DB.logs=DB.logs.filter(l=>l.rentalId!==editId);
  dbSave();modalClose('modal-rental');render();
}
function doMarkDone(){
  if(!editId)return;
  const r=DB.rentals.find(x=>x.id===editId);if(!r)return;
  r.done=true;
  // 반납완료 로그
  r.items.forEach(it=>{

function doUndoDone(){

/* ============================================
   QR SCANNER
   ============================================ */
let qrStream=null,qrRaf=null,qrMode=null; // qrMode: 'item' (대여등록 품목추가) | 'prodId' (제품등록 ID 입력)
let lastScanId=null, lastScanTime=0; // 같은 QR 중복 인식 방지용 디바운싱
function qrOpen(mode){
  qrMode=mode;
  lastScanId=null; lastScanTime=0; // 새 스캔 세션마다 리셋
  document.getElementById('qr-pop-title').textContent=mode==='prodId'?'제품 QR ID 입력':'대여 품목 QR 스캔';
  document.getElementById('qr-pop-hint').innerHTML=mode==='prodId'?'제품에 부착된 QR을 스캔하면<br>ID가 자동 입력됩니다':'제품 QR을 스캔하면<br>품목 리스트에 자동 추가됩니다';
  document.getElementById('qr-manual-input').value='';
  document.getElementById('qr-bd').style.display='block';
  document.getElementById('qr-pop').classList.add('open');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    document.getElementById('qr-pop-hint').innerHTML='<span style="color:#ff6b6b">⚠️ 카메라 미지원</span><br>아래 입력란으로 직접 입력하세요';
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}})
    .then(stream=>{
      qrStream=stream;
      const video=document.getElementById('qr-video');
      video.srcObject=stream;
      const canvas=document.getElementById('qr-canvas');
      const ctx=canvas.getContext('2d');
      let found=false;
      function tick(){
        if(found||!qrStream)return;
        if(video.readyState<video.HAVE_ENOUGH_DATA){qrRaf=requestAnimationFrame(tick);return;}
        const w=video.videoWidth,h=video.videoHeight;
        if(!w||!h){qrRaf=requestAnimationFrame(tick);return;}
        canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);
        const img=ctx.getImageData(0,0,w,h);
        const code=jsQR(img.data,w,h,{inversionAttempts:'attemptBoth'});
        if(code&&code.data&&code.data.trim()){
          found=true;
          let id=code.data.trim();
          if(id.startsWith('RENTAL:'))id=id.replace('RENTAL:','');
          handleQrResult(id);
          return;
        }
        qrRaf=requestAnimationFrame(tick);
      }
      video.onloadeddata=()=>{qrRaf=requestAnimationFrame(tick);};
      if(video.readyState>=video.HAVE_ENOUGH_DATA)qrRaf=requestAnimationFrame(tick);
    })
    .catch(()=>{
      document.getElementById('qr-pop-hint').innerHTML='<span style="color:#ff6b6b">⚠️ 카메라 권한 거부</span><br>아래 입력란으로 직접 입력하세요';
    });
}
function qrClose(){
  if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null;}
  cancelAnimationFrame(qrRaf);
  const video=document.getElementById('qr-video');
  if(video)video.srcObject=null;
  document.getElementById('qr-bd').style.display='none';
  document.getElementById('qr-pop').classList.remove('open');
  qrMode=null;
}
function qrManualSubmit(){
  const v=document.getElementById('qr-manual-input').value.trim();
  if(!v){toast('⚠️ ID를 입력하세요');return;}
  handleQrResult(v);
}
function handleQrResult(id){
  const now=Date.now();
  // ── 디바운싱: 같은 QR이 2.5초 안에 또 잡히면 알림 없이 무시하고 카메라 계속 ──
  if(id===lastScanId && now-lastScanTime<2500){
    if(qrStream&&qrMode==='item') resumeItemScan();
    return;
  }
  lastScanId=id;
  lastScanTime=now;

  if(qrMode==='prodId'){
    // 스캔된 QR이 이미 다른 제품에 등록되어 있는지 즉시 확인
    const dup=DB.stock.find(s=>s.qrId===id&&s.id!==editProdId);
    if(dup){
      qrClose();
      alert('⚠️ 이미 등록된 제품입니다.\n\n이 QR 코드는 이미 다음 제품에 등록되어 있습니다:\n→ '+dup.name+(dup.cat?' ('+dup.cat+')':'')+'\n\nQR ID: '+id+'\n\n각 제품은 고유한 QR 코드를 가져야 합니다.');
      return;
    }
    document.getElementById('pf-qrid').value=id;
    toast('✅ QR ID 입력: '+id);
    qrClose();
  } else if(qrMode==='item'){
    addItemByQrId(id);
    // 성공이든 거부든 카메라 계속 작동 (디바운싱이 같은 QR 무시함)
    resumeItemScan();
  }
}
// item 모드 카메라 스캔 재개
function resumeItemScan(){
  if(!qrStream)return;
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  if(!video||!canvas)return;
  const ctx=canvas.getContext('2d');
  let f=false;
  (function loop(){
    if(f||!qrStream||qrMode!=='item')return;
    if(video.readyState<video.HAVE_ENOUGH_DATA){qrRaf=requestAnimationFrame(loop);return;}
    const w=video.videoWidth,h=video.videoHeight;
    if(!w||!h){qrRaf=requestAnimationFrame(loop);return;}
    canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);
    const code=jsQR(ctx.getImageData(0,0,w,h).data,w,h,{inversionAttempts:'attemptBoth'});
    if(code&&code.data&&code.data.trim()){
      f=true;
      let nid=code.data.trim();
      if(nid.startsWith('RENTAL:'))nid=nid.replace('RENTAL:','');
      handleQrResult(nid);
      return;
    }
    qrRaf=requestAnimationFrame(loop);
  })();
}

document.addEventListener('click',function(ev){
  const t=ev.target;
  // 달력
  const calDay=t.closest('[data-cal-day]');
  if(calDay){
    const[key,dstr]=calDay.dataset.calDay.split('|');
    const c=CSTATE[key],d=clr(dp(dstr));
    if(!c.s||c.step==='s'||(c.s&&c.e)){c.s=d;c.e=null;c.step='e';}
    else{if(d<c.s){c.s=d;c.e=null;c.step='e';}else{c.e=d;c.step='done';}}
    calBuild(key);calUpdateBtn(key);return;
  }
  const calNav=t.closest('[data-cal-nav]');
  if(calNav){const[key,dir]=calNav.dataset.calNav.split('|');const c=CSTATE[key];c.m+=parseInt(dir);if(c.m>11){c.m=0;c.y++;}if(c.m<0){c.m=11;c.y--;}calBuild(key);return;}
  const calClr=t.closest('[data-cal-clear]');
  if(calClr){const key=calClr.dataset.calClear;const c=CSTATE[key];c.s=null;c.e=null;c.step='s';calBuild(key);calUpdateBtn(key);return;}
  const calCfm=t.closest('[data-cal-confirm]');
  if(calCfm){calUpdateBtn(calCfm.dataset.calConfirm);calClose();return;}
  const openCal=t.closest('[data-open-cal]');
  if(openCal){calOpen(openCal.dataset.openCal);return;}
  // 모달
  const closeBtn=t.closest('[data-close]');
  if(closeBtn){modalClose(closeBtn.dataset.close);return;}
  // 간트 행 / 날짜
  const editBtn=t.closest('[data-edit]');
  if(editBtn){rentalEdit(editBtn.dataset.edit);return;}
  const dayBtn=t.closest('[data-day]');
  if(dayBtn){dayOpen(dayBtn.dataset.day);return;}
  // 품목 삭제
  const rmItem=t.closest('[data-rm-item]');
  if(rmItem){const el=document.getElementById(rmItem.dataset.rmItem);if(el)el.remove();return;}
  // 휴무 삭제
  const delHol=t.closest('[data-del-hol]');
  if(delHol){DB.hol=DB.hol.filter(h=>h.date!==delHol.dataset.delHol);dbSave();holRender();render();if(openCalKey)calBuild(openCalKey);return;}
  // 제품 액션
  const pdet=t.closest('[data-prod-detail]');
  if(pdet){openProdDetail(pdet.dataset.prodDetail);return;}
  const pedt=t.closest('[data-prod-edit]');
  if(pedt){openProdEdit(pedt.dataset.prodEdit);return;}
  const pqr=t.closest('[data-prod-qr]');
  if(pqr){openQrGen(pqr.dataset.prodQr);return;}
  // overlay 배경 클릭
  if(t.classList.contains('overlay')){modalClose(t.id);return;}
});
document.addEventListener('change',ev=>{if(ev.target.id==='f-ship')shipToggle();});
document.getElementById('cal-bd').addEventListener('click',calClose);
document.getElementById('qr-bd').addEventListener('click',qrClose);

/* ===== TOOLBAR ===== */

document.getElementById('btn-next').addEventListener('click',()=>{VM++;if(VM>11){VM=0;VY++;}render();});
document.getElementById('btn-add-rental').addEventListener('click',rentalAdd);
document.getElementById('btn-hol').addEventListener('click',holOpen);
document.getElementById('btn-csv').addEventListener('click',exportCSV);
document.getElementById('btn-save-html').addEventListener('click',saveHTML);
document.getElementById('btn-add-item').addEventListener('click',()=>itemsAdd());
document.getElementById('btn-qr-add-item').addEventListener('click',()=>qrOpen('item'));
document.getElementById('btn-pf-scan').addEventListener('click',()=>qrOpen('prodId'));
document.getElementById('btn-add-prod').addEventListener('click',openProdAdd);
document.getElementById('btn-log-csv').addEventListener('click',exportLogCSV);
document.getElementById('btn-clear-logs').addEventListener('click',function(){
  if(!confirm('모든 대여기록을 삭제하시겠습니까?\n(대여 데이터는 유지되며 로그만 삭제됩니다)'))return;
  DB.logs=[];dbSave();renderLogs();toast('✅ 기록 삭제됨');
});

document.getElementById('log-q').addEventListener('input',renderLogs);

document.getElementById('col-minus').addEventListener('click',()=>{COL_W=Math.max(40,COL_W-8);saveLayout();render();});
document.getElementById('col-plus').addEventListener('click',()=>{COL_W=Math.min(200,COL_W+8);saveLayout();render();});
document.getElementById('row-minus').addEventListener('click',()=>{ROW_H=Math.max(28,ROW_H-4);saveLayout();applyCss();});

document.getElementById('btn-add-hol').addEventListener('click',function(){
  const date=document.getElementById('hol-date').value;
  const memo=document.getElementById('hol-memo').value.trim();
  if(!date){alert('날짜를 선택하세요.');return;}
  if(DB.hol.some(h=>h.date===date)){alert('이미 등록된 날짜입니다.');return;}
  DB.hol.push({date,memo});dbSave();holRender();render();
  if(openCalKey)calBuild(openCalKey);
});

/* ===== TOAST ===== */
function toast(msg){
  let t=document.getElementById('toast-el');
  if(!t){t=document.createElement('div');t.id='toast-el';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ===== SEARCH (간트 필터링) ===== */
let searchQuery='';
function initSearch(){
  const inp=document.getElementById('search-input');
  const clrBtn=document.getElementById('search-clear');
  const ico=document.getElementById('search-ico');
  if(!inp)return;
  inp.addEventListener('input',function(){
    searchQuery=this.value.trim().toLowerCase();
    clrBtn.classList.toggle('hide',!searchQuery);
    ico.classList.toggle('hide',!!searchQuery);
    applySearch();
  });
  clrBtn.addEventListener('click',function(){
    inp.value='';searchQuery='';clrBtn.classList.add('hide');ico.classList.remove('hide');applySearch();
  });
}
function applySearch(){
  const rows=document.querySelectorAll('.g-row');
  let vis=0;
  rows.forEach(row=>{
    if(!searchQuery){row.style.display='';vis++;return;}
    const rid=row.dataset.rid||'';
    const r=rid?DB.rentals.find(x=>x.id===rid):null;
    if(!r){row.style.display='';return;}
    const txt=(r.cust+' '+isum(r)+' '+(r.phone||'')+' '+(r.addr||'')+' '+(r.memo||'')).toLowerCase();
    const match=txt.includes(searchQuery);
    row.style.display=match?'':'none';
    if(match)vis++;
  });
  document.getElementById('search-count').textContent=searchQuery?`${vis}건`:'';
}

/* ===== INIT ===== */
render();
initSearch();
</script>
